limit_req_zone $binary_remote_addr zone=monitor_api_limit:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=monitor_conn_limit:10m;

server {
    listen 80;
    server_tokens off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Cache-Control "no-store" always;

    location / {
        limit_except GET HEAD { deny all; }
        limit_req zone=monitor_api_limit burst=20 nodelay;
        limit_conn monitor_conn_limit 20;
        proxy_pass http://app:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
