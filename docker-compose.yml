services:

  app:
    build: .
    container_name: ops-monitor-app
    restart: always
    env_file:
      - .env
    ports:
    - "8000:8000"
    depends_on:
    - db

  db:
    image: postgres:16
    container_name: ops-monitor-db
    restart: always
    env_file:
    - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: