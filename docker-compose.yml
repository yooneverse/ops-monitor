services:
  db:
    image: postgres:16
    container_name: ops-monitor-db
    restart: always
    environment:
      POSTGRES_USER: ops_user
      POSTGRES_PASSWORD: ops_password
      POSTGRES_DB: ops_monitor
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: